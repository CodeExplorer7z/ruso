<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Ruso: Géneros App (10)</title>
    <style>
        :root { --p: #3498db; --s: #2ecc71; --d: #e74c3c; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5rem; margin-bottom: 5px; }
        .instr { font-size: 0.85rem; color: #666; text-align: center; margin-bottom: 20px; }
        .item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .item-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .word { font-size: 1.2rem; font-weight: bold; }
        .red { color: var(--d); text-decoration: underline; }
        .trans { font-weight: normal; font-size: 0.8rem; color: #888; display: block; }
        .btns { display: flex; gap: 8px; }
        button { flex: 1; padding: 10px 2px; border: 1px solid #ddd; border-radius: 8px; background: white; font-weight: bold; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .correct { background: var(--s) !important; color: white; border-color: var(--s); }
        .wrong { background: var(--d) !important; color: white; border-color: var(--d); }
        .mark { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h1>Уроки русского</h1>
    <p class="instr">Elige el género según la letra <span style="color:red">roja</span></p>
    <div id="quiz"></div>
</div>

<script>
    const vocab = [
        {w:"Сто<span class='red'>л</span>", i:"🪑", g:"m", t:"Mesa"},
        {w:"Школ<span class='red'>а</span>", i:"🏫", g:"f", t:"Escuela"},
        {w:"Окн<span class='red'>о</span>", i:"🪟", g:"n", t:"Ventana"},
        {w:"Дру<span class='red'>г</span>", i:"👤", g:"m", t:"Amigo"},
        {w:"Книг<span class='red'>а</span>", i:"📖", g:"f", t:"Libro"},
        {w:"Молок<span class='red'>о</span>", i:"🥛", g:"n", t:"Leche"},
        {w:"Бра<span class='red'>т</span>", i:"👦", g:"m", t:"Hermano"},
        {w:"Сестр<span class='red'>а</span>", i:"👧", g:"f", t:"Hermana"},
        {w:"Море<span class='red'>е</span>", i:"🌊", g:"n", t:"Mar"},
        {w:"Пап<span class='red'>а</span>", i:"👨", g:"m", t:"Papá"}
    ];

    const container = document.getElementById('quiz');
    vocab.forEach((item, i) => {
        container.innerHTML += `
            <div class="item">
                <div class="item-head">
                    <div class="word">${item.i || ''} ${item.w} <span class="trans">(${item.t})</span></div>
                    <span id="m${i}" class="mark"></span>
                </div>
                <div class="btns" id="b${i}">
                    <button onclick="val(${i},'m','${item.g}')">MASC</button>
                    <button onclick="val(${i},'f','${item.g}')">FEM</button>
                    <button onclick="val(${i},'n','${item.g}')">NEUT</button>
                </div>
            </div>`;
    });

    function val(idx, sel, corr) {
        const mark = document.getElementById('m'+idx);
        const btns = document.getElementById('b'+idx).querySelectorAll('button');
        btns.forEach(b => {
            b.disabled = true;
            if(b.innerText.toLowerCase().startsWith(corr)) b.classList.add('correct');
            if(b.innerText.toLowerCase().startsWith(sel) && sel !== corr) b.classList.add('wrong');
        });
        mark.innerHTML = (sel === corr) ? "<span style='color:var(--s)'>✓</span>" : "<span style='color:var(--d)'>✕</span>";
    }
</script>
</body>
</html>
