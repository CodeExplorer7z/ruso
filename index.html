<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruso: Géneros con Audio</title>
    <style>
        :root { --p: #3498db; --s: #2ecc71; --d: #e74c3c; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5rem; margin-bottom: 5px; }
        .instr { font-size: 0.85rem; color: #666; text-align: center; margin-bottom: 20px; }
        .item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .item-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .word-box { display: flex; align-items: center; gap: 10px; }
        .word { font-size: 1.2rem; font-weight: bold; }
        .red { color: var(--d); text-decoration: underline; }
        .trans { font-weight: normal; font-size: 0.8rem; color: #888; display: block; }
        .btn-audio { background: #eee; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
        .btns { display: flex; gap: 8px; }
        button.choice { flex: 1; padding: 10px 2px; border: 1px solid #ddd; border-radius: 8px; background: white; font-weight: bold; font-size: 0.75rem; cursor: pointer; }
        .correct { background: var(--s) !important; color: white; border-color: var(--s); }
        .wrong { background: var(--d) !important; color: white; border-color: var(--d); }
        #next-btn { width: 100%; margin-top: 20px; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h1 id="page-title">Cargando...</h1>
    <p class="instr">Escucha y elige el género (m, f, n)</p>
    <div id="quiz"></div>
    <button id="next-btn">SIGUIENTE PÁGINA</button>
</div>

<script>
    // Todo el JavaScript va aquí dentro
    const allVocab = [
        {w:"Стол", i:"🪑", g:"m", t:"Mesa", r:"л"},
        {w:"Школа", i:"🏫", g:"f", t:"Escuela", r:"а"},
        {w:"Окно", i:"🪟", g:"n", t:"Ventana", r:"о"},
        {w:"Друг", i:"👤", g:"m", t:"Amigo", r:"г"},
        {w:"Книга", i:"📖", g:"f", t:"Libro", r:"а"},
        {w:"Молоко", i:"🥛", g:"n", t:"Leche", r:"о"},
        {w:"Брат", i:"👦", g:"m", t:"Hermano", r:"т"},
        {w:"Сестра", i:"👧", g:"f", t:"Hermana", r:"а"},
        {w:"Море", i:"🌊", g:"n", t:"Mar", r:"е"},
        {w:"Папа", i:"👨", g:"m", t:"Papá", r:"а"},
        {w:"Дом", i:"🏠", g:"m", t:"Casa", r:"м"},
        {w:"Машина", i:"🚗", g:"f", t:"Coche", r:"а"},
        {w:"Платье", i:"👗", g:"n", t:"Vestido", r:"е"},
        {w:"Кот", i:"🐈", g:"m", t:"Gato", r:"т"},
        {w:"Собака", i:"🐕", g:"f", t:"Perro", r:"а"},
        {w:"Яблоко", i:"🍎", g:"n", t:"Manzana", r:"о"},
        {w:"Город", i:"🏙️", g:"m", t:"Ciudad", r:"д"},
        {w:"Ручка", i:"🖊️", g:"f", t:"Bolígrafo", r:"а"},
        {w:"Здание", i:"🏢", g:"n", t:"Edificio", r:"е"},
        {w:"Телефон", i:"📱", g:"m", t:"Teléfono", r:"н"},
        {w:"Учитель", i:"👨‍🏫", g:"m", t:"Profesor", r:"ь"},
        {w:"Газета", i:"📰", g:"f", t:"Periódico", r:"а"},
        {w:"Поле", i:"🌱", g:"n", t:"Campo", r:"е"},
        {w:"Журнал", i:"📓", g:"m", t:"Revista", r:"л"},
        {w:"Семья", i:"👨‍👩‍👧", g:"f", t:"Familia", r:"я"},
        {w:"Солнце", i:"☀️", g:"n", t:"Sol", r:"е"},
        {w:"Хлеб", i:"🍞", g:"m", t:"Pan", r:"б"},
        {w:"Вода", i:"💧", g:"f", t:"Agua", r:"а"},
        {w:"Лицо", i:"👤", g:"n", t:"Cara", r:"о"},
        {w:"Мужчина", i:"🧔", g:"m", t:"Hombre", r:"а"}
    ];

    let currentPage = 0;
    const itemsPerPage = 10;

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function val(idx, sel, corr) {
        const mark = document.getElementById('m' + idx);
        const btnContainer = document.getElementById('b' + idx);
        const btns = btnContainer.querySelectorAll('button');
        
        btns.forEach(b => {
            b.disabled = true;
            const genderAttr = b.getAttribute('data-g');
            if (genderAttr === corr) b.classList.add('correct');
            if (genderAttr === sel && sel !== corr) b.classList.add('wrong');
        });
        
        mark.innerHTML = (sel === corr) ? "✅" : "❌";
        speak(allVocab[idx].w);
    }

    function renderPage() {
        const container = document.getElementById('quiz');
        const title = document.getElementById('page-title');
        const nextBtn = document.getElementById('next-btn');
        
        container.innerHTML = '';
        title.innerText = `Lección Rusa - Parte ${currentPage + 1}`;
        
        const start = currentPage * itemsPerPage;
        const pageItems = allVocab.slice(start, start + itemsPerPage);

        pageItems.forEach((item, i) => {
            const globalIdx = start + i;
            const displayedWord = item.w.replace(new RegExp(item.r + "$"), `<span class="red">${item.r}</span>`);
            
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div class="item-head">
                    <div class="word-box">
                        <button class="btn-audio" onclick="speak('${item.w}')">🔊</button>
                        <div class="word">${item.i} ${displayedWord} <span class="trans">(${item.t})</span></div>
                    </div>
                    <span id="m${globalIdx}" class="mark"></span>
                </div>
                <div class="btns" id="b${globalIdx}">
                    <button class="choice" data-g="m" onclick="val(${globalIdx},'m','${item.g}')">MASC</button>
                    <button class="choice" data-g="f" onclick="val(${globalIdx},'f','${item.g}')">FEM</button>
                    <button class="choice" data-g="n" onclick="val(${globalIdx},'n','${item.g}')">NEUT</button>
                </div>
            `;
            container.appendChild(div);
        });

        nextBtn.innerText = (currentPage < 2) ? "SIGUIENTE PÁGINA" : "¡TERMINAR!";
        nextBtn.onclick = () => {
            if (currentPage < 2) {
                currentPage++;
                renderPage();
                window.scrollTo(0,0);
            } else {
                alert("¡Felicidades!");
            }
        };
    }

    // Esto asegura que el código corra solo cuando el HTML esté listo
    window.onload = renderPage;
</script>

</body>
</html>
